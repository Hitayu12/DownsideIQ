# Alembic configuration. The DB URL is injected from src.core.config at runtime
# (env.py), so SQLite-now / Postgres-later is a single .env change.
[alembic]
script_location = src/db/migrations
prepend_sys_path = .
path_separator = os
# sqlalchemy.url is set programmatically in env.py (do not hardcode here).

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
